# Core Hugo configuration for the website.
title: Mathilde Badufle
baseURL: 'https://mathildebdle.github.io/websiteacademic/'

defaultContentLanguage: en
defaultContentLanguageInSubdir: false
hasCJKLanguage: false
removePathAccents: true

enableRobotsTXT: true
enableGitInfo: false
summaryLength: 30
disableAliases: true

pagination:
  pagerSize: 10

outputs:
  home: [HTML, RSS]
  section: [HTML, RSS]

ignoreFiles:
  - "\\.Rmd$"
  - "\\.Rmarkdown$"
  - "_cache$"
  - ".ipynb_checkpoints$"

imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture

taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    lineNos: false

build:
  writeStats: true

module:
  imports:
    - path: github.com/HugoBlox/kit/modules/blox
    - path: github.com/HugoBlox/kit/modules/slides
    - path: github.com/HugoBlox/kit/modules/integrations/netlify

timeout: 600000
