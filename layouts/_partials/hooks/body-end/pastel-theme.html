<script>
  (function () {
    function applyPastelTheme() {
      var root = document.documentElement;
      var body = document.body;
      var pageBg = document.getElementById('page-bg');

      root.classList.remove('dark');
      root.style.colorScheme = 'light';
      root.style.background = '#eef5fb';

      body.style.background =
        'radial-gradient(circle at top left, rgba(219, 234, 246, 0.95), transparent 34%),' +
        'radial-gradient(circle at top right, rgba(205, 225, 242, 0.8), transparent 28%),' +
        'linear-gradient(180deg, #f3f8fd 0%, #eaf3fb 48%, #edf5fb 100%)';
      body.style.color = '#23364b';

      if (pageBg) {
        pageBg.style.background =
          'radial-gradient(circle at 12% 16%, rgba(214, 231, 246, 0.9), transparent 24%),' +
          'radial-gradient(circle at 88% 12%, rgba(221, 236, 248, 0.9), transparent 22%),' +
          'linear-gradient(180deg, #f4f9fd 0%, #edf5fb 100%)';
      }

      document.querySelectorAll('.page-wrapper, .page-header, .page-body, .page-footer, .home-section, .site-footer').forEach(function (el) {
        el.style.background = 'transparent';
        el.style.color = '#23364b';
      });

      document.querySelectorAll('.navbar').forEach(function (el) {
        el.style.background = 'rgba(248, 251, 254, 0.94)';
        el.style.borderBottom = '1px solid rgba(207, 220, 235, 0.95)';
      });

      document.querySelectorAll('.navbar a, .nav-link').forEach(function (el) {
        el.style.color = '#355b7c';
      });

      document.querySelectorAll('h1, h2, h3, .text-gray-900, .dark\\:text-white').forEach(function (el) {
        el.style.color = '#315a7d';
      });

      document.querySelectorAll('a').forEach(function (el) {
        if (!el.classList.contains('btn-primary')) {
          el.style.color = '#3b678d';
        }
      });
    }

    applyPastelTheme();
    document.addEventListener('DOMContentLoaded', applyPastelTheme);
    window.addEventListener('load', applyPastelTheme);
  })();
</script>
