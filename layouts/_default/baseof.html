<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}Mathilde Badufle | Economics{{ else }}{{ .Title }} | Mathilde Badufle{{ end }}</title>
  <meta name="description" content="{{ with .Params.summary }}{{ . }}{{ else }}Academic website of Mathilde Badufle, PhD researcher in economics.{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <style>
    :root {
      --bg: #eaf3fb;
      --bg-soft: #f5f9fd;
      --card: rgba(255,255,255,0.62);
      --border: #c7d9ea;
      --text: #203549;
      --muted: #5f7890;
      --title: #345f84;
      --link: #3f729d;
      --link-hover: #274f73;
      --shadow: 0 14px 34px rgba(92, 124, 156, 0.10);
    }

    * { box-sizing: border-box; }
    html { color-scheme: light; scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(209, 228, 244, 0.95), transparent 0 22%),
        radial-gradient(circle at 90% 8%, rgba(221, 236, 248, 0.92), transparent 0 18%),
        linear-gradient(180deg, #f4f9fd 0%, var(--bg) 46%, #edf5fb 100%);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      line-height: 1.75;
    }

    a { color: var(--link); text-decoration-thickness: 1px; text-underline-offset: 0.16em; }
    a:hover { color: var(--link-hover); }

    .site-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(245, 249, 253, 0.88);
      border-bottom: 1px solid rgba(199, 217, 234, 0.9);
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      color: var(--title);
      text-decoration: none;
      font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .menu {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .menu a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .menu a.active,
    .menu a:hover {
      color: var(--title);
    }

    .page {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
      flex: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 3rem;
      align-items: center;
      margin-top: 1.5rem;
      margin-bottom: 2.75rem;
    }

    .hero h1,
    .page-title {
      margin: 0 0 0.75rem;
      color: var(--title);
      font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", serif;
      font-size: clamp(2.6rem, 5vw, 4rem);
      font-weight: 600;
      line-height: 1.04;
    }

    .eyebrow {
      margin: 0 0 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.88rem;
    }

    .affiliation {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .summary {
      margin: 0;
      max-width: 720px;
      color: var(--text);
      font-size: 1.06rem;
    }

    .actions {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      margin-top: 1.6rem;
    }

    .btn {
      display: inline-block;
      border-radius: 999px;
      padding: 0.72rem 1.18rem;
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      color: var(--link);
      font-weight: 600;
    }

    .btn.primary {
      background: #5f8eb8;
      border-color: #5f8eb8;
      color: #fff;
    }

    .btn.primary:hover {
      color: #fff;
      background: #4e7ca4;
      border-color: #4e7ca4;
    }

    .portrait {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--bg-soft);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 1.4rem;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(199, 217, 234, 0.92);
      border-radius: 22px;
      padding: 1.5rem 1.6rem;
      box-shadow: var(--shadow);
    }

    .card h2,
    .content h1,
    .content h2,
    .content h3 {
      margin-top: 0;
      color: var(--title);
      font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", serif;
      font-weight: 600;
    }

    .card h2 { font-size: 1.75rem; }
    .content h1 { font-size: 2.4rem; }
    .content h2 { font-size: 1.5rem; margin-top: 2rem; }

    .content {
      max-width: 820px;
      background: var(--card);
      border: 1px solid rgba(199, 217, 234, 0.92);
      border-radius: 22px;
      padding: 1.75rem 1.8rem;
      box-shadow: var(--shadow);
    }

    .content ul { padding-left: 1.3rem; }
    .content li { margin-bottom: 0.65rem; }
    .muted { color: var(--muted); }

    .research-layout {
      display: grid;
      grid-template-columns: 0.78fr 1.22fr;
      gap: 1.4rem;
      align-items: start;
    }

    .research-sidebar {
      display: grid;
      gap: 1rem;
      position: sticky;
      top: 5.8rem;
    }

    .research-main {
      display: grid;
      gap: 1rem;
    }

    .research-card,
    .info-card {
      background: var(--card);
      border: 1px solid rgba(199, 217, 234, 0.92);
      border-radius: 22px;
      padding: 1.5rem 1.6rem;
      box-shadow: var(--shadow);
    }

    .info-card h2,
    .research-card h2,
    .research-card h3 {
      margin-top: 0;
      color: var(--title);
      font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", serif;
      font-weight: 600;
    }

    .info-list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .project-title {
      margin-bottom: 0.45rem;
      font-size: 1.5rem;
      line-height: 1.25;
    }

    .project-status {
      display: inline-block;
      margin-bottom: 0.9rem;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      background: rgba(95, 142, 184, 0.12);
      color: #486f93;
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .site-footer {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto 2rem;
      padding-top: 1rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {
      .hero,
      .grid,
      .research-layout {
        grid-template-columns: 1fr;
      }

      .research-sidebar {
        position: static;
      }

      .portrait {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{ "/" | relURL }}">Mathilde Badufle</a>
        <div class="menu">
          {{ $current := .RelPermalink }}
          {{ range site.Menus.main }}
            {{ $href := "" }}
            {{ with .Page }}
              {{ $href = .RelPermalink }}
            {{ else }}
              {{ $href = .URL }}
            {{ end }}
            <a href="{{ $href }}" class="{{ if eq $current $href }}active{{ end }}">{{ .Name }}</a>
          {{ end }}
        </div>
      </nav>
    </header>

    <main class="page">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      © {{ now.Year }} Mathilde Badufle
    </footer>
  </div>
</body>
</html>
